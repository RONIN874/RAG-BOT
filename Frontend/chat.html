<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat · AskDoc</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"DM Sans"', 'ui-sans-serif', 'sans-serif'],
            serif: ['"DM Serif Display"', 'Georgia', 'serif'],
          },
          colors: {
            sage: { 50: '#f4f7f5', 100: '#e6ede9', 200: '#ccdbd3', 300: '#a5c0b1', 400: '#779f8b', 500: '#557f6d', 600: '#426357', 700: '#364f46', 800: '#2d3f39', 900: '#273530' },
            stone: { 50: '#fafaf9', 100: '#f5f5f4', 200: '#e7e5e4', 300: '#d6d3d1', 400: '#a8a29e', 500: '#78716c', 600: '#57534e', 700: '#44403c', 800: '#292524', 900: '#1c1917' },
          },
        },
      },
    };
  </script>
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f4f7f5;
      overflow: hidden;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #ccdbd3;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a5c0b1;
    }

    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 280px;
      background: #ffffff;
      border-right: 1px solid #e6ede9;
      z-index: 40;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }

    #sidebar.open {
      transform: translateX(0);
      box-shadow: 4px 0 24px rgba(0, 0, 0, 0.07);
    }

    #sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.18);
      z-index: 39;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #sidebar-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .history-item {
      padding: 0.65rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s ease;
      border: 1px solid transparent;
    }

    .history-item:hover {
      background: #f4f7f5;
      border-color: #e6ede9;
    }

    .history-item.active {
      background: #e6ede9;
      border-color: #ccdbd3;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInLeft {
      from {
        opacity: 0;
        transform: translateX(-16px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .msg-animate {
      animation: fadeInUp 0.3s ease-out forwards;
    }

    @keyframes blink {

      0%,
      80%,
      100% {
        opacity: 0.2;
      }

      40% {
        opacity: 1;
      }
    }

    .dot-1 {
      animation: blink 1.4s infinite 0s;
    }

    .dot-2 {
      animation: blink 1.4s infinite 0.2s;
    }

    .dot-3 {
      animation: blink 1.4s infinite 0.4s;
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(1);
        opacity: 0.6;
      }

      100% {
        transform: scale(1.6);
        opacity: 0;
      }
    }

    #mic-btn.listening .mic-ring {
      animation: pulse-ring 1s ease-out infinite;
    }

    #mic-btn.listening {
      background: #e6ede9 !important;
      border-color: #557f6d !important;
    }

    #mic-btn.listening svg {
      color: #557f6d;
    }

    .ai-prose p {
      margin-bottom: 0.5em;
    }

    .ai-prose ul,
    .ai-prose ol {
      margin-left: 1.25em;
      margin-bottom: 0.5em;
    }

    .ai-prose li {
      list-style: disc;
      margin-bottom: 0.2em;
    }

    .ai-prose strong {
      font-weight: 600;
    }

    .ai-prose code {
      background: #e8eaed;
      padding: 0.1em 0.35em;
      border-radius: 4px;
      font-size: 0.82em;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .ai-prose pre {
      background: #f1f3f5;
      padding: 0.75em 1em;
      border-radius: 6px;
      overflow-x: auto;
      margin-bottom: 0.75em;
    }

    .ai-prose pre code {
      background: transparent;
      padding: 0;
    }

    .ai-prose h1,
    .ai-prose h2,
    .ai-prose h3 {
      font-weight: 600;
      margin-top: 0.75em;
      margin-bottom: 0.35em;
    }

    .ai-prose h1 {
      font-size: 1.15em;
    }

    .ai-prose h2 {
      font-size: 1.05em;
    }

    .ai-prose h3 {
      font-size: 0.95em;
    }

    .ai-prose table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 0.75em;
      font-size: 0.85em;
    }

    .ai-prose th,
    .ai-prose td {
      border: 1px solid #d1d5db;
      padding: 0.4em 0.65em;
      text-align: left;
    }

    .ai-prose th {
      background: #f4f7f5;
      font-weight: 600;
    }

    .ai-prose blockquote {
      border-left: 3px solid #ccdbd3;
      padding-left: 0.75em;
      color: #64748b;
      margin-bottom: 0.5em;
    }

    textarea:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #slowstart-banner {
      display: none;
      animation: fadeInUp 0.4s ease-out forwards;
    }

    #slowstart-banner.visible {
      display: flex;
    }
  </style>
</head>

<body class="h-screen antialiased flex flex-col">

  <!-- Sidebar overlay -->
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="flex items-center justify-between px-4 pt-5 pb-3 border-b border-stone-100">
      <p class="text-xs font-semibold tracking-widest uppercase text-stone-400">History</p>
      <button onclick="closeSidebar()"
        class="w-7 h-7 rounded-lg flex items-center justify-center hover:bg-stone-100 transition-colors">
        <svg class="w-4 h-4 text-stone-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
    <div id="history-list" class="flex-1 overflow-y-auto px-3 py-3 space-y-1"></div>
    <div class="px-3 py-3 border-t border-stone-100 space-y-1">
      <button onclick="newSession()"
        class="w-full text-left px-3 py-2 rounded-lg text-xs font-medium text-sage-700 bg-sage-50 hover:bg-sage-100 transition-colors flex items-center gap-2">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        New conversation
      </button>
      <button onclick="clearAllHistory()"
        class="w-full text-left px-3 py-2 rounded-lg text-xs font-medium text-stone-400 hover:text-red-500 hover:bg-red-50 transition-colors flex items-center gap-2">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
          <path d="M10 11v6" />
          <path d="M14 11v6" />
          <path d="M9 6V4h6v2" />
        </svg>
        Clear all history
      </button>
    </div>
  </aside>

  <!-- Header -->
  <header class="flex-shrink-0 bg-white/90 backdrop-blur border-b border-stone-200/70 z-30">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <button onclick="toggleSidebar()"
          class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-stone-100 transition-colors"
          title="Chat history">
          <svg class="w-4 h-4 text-stone-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <div class="w-px h-5 bg-stone-200 mx-1"></div>
        <div class="w-7 h-7 rounded-lg bg-sage-700 flex items-center justify-center">
          <svg class="w-3.5 h-3.5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a5 5 0 0 1 5 5v3a5 5 0 0 1-10 0V7a5 5 0 0 1 5-5Z" />
            <path d="M19 10v1a7 7 0 0 1-14 0v-1" />
            <line x1="12" y1="19" x2="12" y2="22" />
          </svg>
        </div>
        <div>
          <h1 class="text-sm font-semibold text-stone-700 leading-none tracking-tight">AskDoc</h1>
          <p class="text-[10px] text-stone-400 font-medium mt-0.5">Ask questions about your documents</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <div id="status-indicator"
          class="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-stone-100 border border-stone-200 transition-all duration-500">
          <span class="relative flex h-2 w-2">
            <span id="status-ping"
              class="animate-ping absolute inline-flex h-full w-full rounded-full bg-stone-400 opacity-50"></span>
            <span id="status-dot" class="relative inline-flex rounded-full h-2 w-2 bg-stone-400"></span>
          </span>
          <span id="status-text" class="text-[10px] font-medium text-stone-500">Checking…</span>
        </div>
        <a href="/dashboard" title="Document dashboard"
          class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-stone-100 transition-colors">
          <svg class="w-4 h-4 text-stone-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
          </svg>
        </a>
        <a href="/home" title="Back to home"
          class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-stone-100 transition-colors">
          <svg class="w-4 h-4 text-stone-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
        </a>
      </div>
    </div>
  </header>

  <!-- Slow-start banner -->
  <div id="slowstart-banner"
    class="flex-shrink-0 items-center gap-2.5 bg-amber-50 border-b border-amber-200/60 px-5 py-2.5">
    <svg class="w-4 h-4 text-amber-500 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10" />
      <line x1="12" y1="8" x2="12" y2="12" />
      <line x1="12" y1="16" x2="12.01" y2="16" />
    </svg>
    <p class="text-[11.5px] text-amber-700 leading-relaxed">
      The backend is waking up from sleep — this first response may take up to 60 seconds. Subsequent requests will be
      fast.
    </p>
  </div>

  <!-- Chat area -->
  <main id="chat-area" class="flex-1 overflow-y-auto overscroll-contain">
    <div id="messages" class="max-w-3xl mx-auto px-5 py-6 space-y-5"></div>
  </main>

  <!-- Input area -->
  <footer class="flex-shrink-0 bg-white/90 backdrop-blur border-t border-stone-200/70">
    <div class="max-w-3xl mx-auto px-4 pt-3 pb-4">
      <div class="flex items-end gap-2">
        <div class="relative flex-shrink-0">
          <button id="mic-btn" onclick="toggleVoice()" title="Voice input"
            class="relative w-[46px] h-[46px] rounded-xl border border-stone-200 bg-stone-50 hover:bg-stone-100 flex items-center justify-center transition-all duration-200">
            <span class="mic-ring absolute inset-0 rounded-xl bg-sage-300 opacity-0"></span>
            <svg class="w-[18px] h-[18px] text-stone-500 relative z-10" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3Z" />
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <line x1="12" y1="19" x2="12" y2="23" />
              <line x1="8" y1="23" x2="16" y2="23" />
            </svg>
          </button>
        </div>
        <div class="flex-1 relative">
          <textarea id="user-input" rows="1" maxlength="1000"
            placeholder="Ask a question about your uploaded documents…"
            class="w-full resize-none rounded-xl border border-stone-200 bg-stone-50/80 px-4 py-3 text-sm text-stone-700 placeholder:text-stone-400 focus:outline-none focus:ring-2 focus:ring-sage-300/60 focus:border-sage-300 transition-shadow duration-200"
            style="max-height:140px;"></textarea>
          <span id="char-counter"
            class="absolute bottom-2 right-3 text-[10px] text-stone-300 pointer-events-none hidden"></span>
        </div>
        <button id="send-btn" onclick="sendMessage()"
          class="flex-shrink-0 h-[46px] w-[46px] rounded-xl bg-sage-700 hover:bg-sage-800 active:scale-95 text-white flex items-center justify-center transition-all duration-150 disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>
      <p class="text-[10.5px] text-stone-400 mt-2 text-center">AI-generated responses may not always be accurate. Verify
        critical queries independently.</p>
    </div>
  </footer>

  <script>
    const API_BASE = 'https://lulwi-askdoc.hf.space'

    const chatArea = document.getElementById('chat-area');
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const micBtn = document.getElementById('mic-btn');
    const charCounter = document.getElementById('char-counter');
    const slowBanner = document.getElementById('slowstart-banner');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');
    const historyList = document.getElementById('history-list');
    const statusIndicator = document.getElementById('status-indicator');
    const statusDot = document.getElementById('status-dot');
    const statusPing = document.getElementById('status-ping');
    const statusText = document.getElementById('status-text');

    let isProcessing = false;
    let slowTimer = null;
    let recognition = null;
    let isListening = false;
    let currentSessionId = null;

    const SESSIONS_KEY = 'askdoc_sessions';
    const SESSION_PFX = 'askdoc_sess_';

    function getSessions() {
      try { return JSON.parse(localStorage.getItem(SESSIONS_KEY) || '[]'); } catch { return []; }
    }
    function saveSessions(arr) { localStorage.setItem(SESSIONS_KEY, JSON.stringify(arr)); }
    function getSessionMessages(id) {
      try { return JSON.parse(localStorage.getItem(SESSION_PFX + id) || '[]'); } catch { return []; }
    }
    function saveSessionMessages(id, msgs) { localStorage.setItem(SESSION_PFX + id, JSON.stringify(msgs)); }
    function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

    function newSession() {
      saveCurrentSession();
      const id = generateId();
      const sessions = getSessions();
      sessions.unshift({ id, title: 'New conversation', ts: Date.now() });
      saveSessions(sessions);
      currentSessionId = id;
      messagesEl.innerHTML = '';
      renderWelcomeCard();
      renderHistoryList();
      closeSidebar();
      inputEl.focus();
    }

    function saveCurrentSession() {
      if (!currentSessionId) return;
      const bubbles = messagesEl.querySelectorAll('[data-role]');
      if (!bubbles.length) return;
      const msgs = Array.from(bubbles).map(el => ({ role: el.dataset.role, text: el.dataset.text || '', time: el.dataset.time || '' }));
      saveSessionMessages(currentSessionId, msgs);
      const firstUser = msgs.find(m => m.role === 'user');
      if (firstUser) {
        const sessions = getSessions();
        const idx = sessions.findIndex(s => s.id === currentSessionId);
        if (idx !== -1) {
          sessions[idx].title = firstUser.text.slice(0, 52) + (firstUser.text.length > 52 ? '…' : '');
          sessions[idx].ts = Date.now();
          saveSessions(sessions);
        }
      }
    }

    function loadSession(id) {
      saveCurrentSession();
      currentSessionId = id;
      messagesEl.innerHTML = '';
      const msgs = getSessionMessages(id);
      if (!msgs.length) { renderWelcomeCard(); }
      else {
        msgs.forEach(m => {
          if (m.role === 'user') _addUserBubble(m.text, m.time, false);
          else if (m.role === 'ai') _addAIBubble(m.text, m.time, false);
          else if (m.role === 'error') _addErrorBubble(m.text, false);
        });
        scrollToBottom();
      }
      renderHistoryList();
      closeSidebar();
    }

    function deleteSession(id, e) {
      e.stopPropagation();
      let sessions = getSessions().filter(s => s.id !== id);
      saveSessions(sessions);
      localStorage.removeItem(SESSION_PFX + id);
      if (id === currentSessionId) {
        if (sessions.length) loadSession(sessions[0].id);
        else newSession();
      } else { renderHistoryList(); }
    }

    function clearAllHistory() {
      if (!confirm('Delete all conversation history? This cannot be undone.')) return;
      getSessions().forEach(s => localStorage.removeItem(SESSION_PFX + s.id));
      localStorage.removeItem(SESSIONS_KEY);
      currentSessionId = null;
      newSession();
    }

    function renderHistoryList() {
      const sessions = getSessions();
      if (!sessions.length) {
        historyList.innerHTML = '<p class="text-xs text-stone-400 px-2 py-4 text-center leading-relaxed">No saved conversations yet.<br/>Start asking to build history.</p>';
        return;
      }
      historyList.innerHTML = sessions.map(s => `
        <div class="history-item flex items-start justify-between gap-2 group ${s.id === currentSessionId ? 'active' : ''}" onclick="loadSession('${s.id}')">
          <div class="min-w-0">
            <p class="text-xs font-medium text-stone-700 truncate leading-snug">${escapeHtml(s.title)}</p>
            <p class="text-[10px] text-stone-400 mt-0.5">${relativeTime(s.ts)}</p>
          </div>
          <button onclick="deleteSession('${s.id}', event)" class="flex-shrink-0 w-5 h-5 rounded flex items-center justify-center text-stone-300 hover:text-red-400 hover:bg-red-50 opacity-0 group-hover:opacity-100 transition-all mt-0.5">
            <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>`).join('');
    }

    function relativeTime(ts) {
      const diff = Date.now() - ts, m = Math.floor(diff / 60000);
      if (m < 1) return 'Just now'; if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60); if (h < 24) return `${h}h ago`;
      const d = Math.floor(h / 24); if (d < 7) return `${d}d ago`;
      return new Date(ts).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    }

    function toggleSidebar() {
      sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('visible');
      if (sidebar.classList.contains('open')) renderHistoryList();
    }
    function closeSidebar() { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('visible'); }

    function renderWelcomeCard() {
      const card = document.createElement('div');
      card.id = 'welcome-card';
      card.className = 'msg-animate flex flex-col items-center text-center py-10';
      card.innerHTML = `
        <div class="w-12 h-12 rounded-2xl bg-sage-100 border border-sage-200/50 flex items-center justify-center mb-5">
          <svg class="w-6 h-6 text-sage-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <h2 class="text-base font-semibold text-stone-700 mb-1.5">What would you like to know?</h2>
        <p class="text-sm text-stone-400 max-w-md leading-relaxed">Ask in plain English. I'll search your uploaded PDF documents and return relevant answers with source references.</p>`;
      messagesEl.appendChild(card);
    }

    function dismissWelcomeCard() {
      const card = document.getElementById('welcome-card');
      if (card) { card.style.transition = 'opacity 0.2s ease'; card.style.opacity = '0'; setTimeout(() => card.remove(), 200); }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function renderMarkdown(text) {
      if (!text) return '';
      let html = text
        .replace(/```(\w*)\n([\s\S]*?)```/g, (_, _l, code) => `<pre><code>${escapeHtml(code.trim())}</code></pre>`)
        .replace(/`([^`]+)`/g, (_, code) => `<code>${escapeHtml(code)}</code>`)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>').replace(/^## (.+)$/gm, '<h2>$1</h2>').replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
      html = html.replace(/^(\|.+\|)\s*\n\|[\s\-:|]+\|\s*\n((?:\|.+\|\s*\n?)*)/gm, (_, hRow, bRows) => {
        const heads = hRow.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
        const rows = bRows.trim().split('\n').map(row => { const cells = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join(''); return `<tr>${cells}</tr>`; }).join('');
        return `<table><thead><tr>${heads}</tr></thead><tbody>${rows}</tbody></table>`;
      });
      html = html.replace(/((?:<li>.*<\/li>\s*)+)/g, '<ul>$1</ul>');
      html = html.split('\n').map(line => {
        const t = line.trim(); if (!t) return '';
        if (/^<(?:h[1-6]|ul|ol|li|pre|table|thead|tbody|tr|th|td|blockquote|div)/.test(t)) return t;
        return `<p>${t}</p>`;
      }).join('\n');
      return html;
    }

    function formatTime() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

    function _addUserBubble(text, time, animate) {
      const div = document.createElement('div');
      div.className = (animate ? 'msg-animate ' : '') + 'flex justify-end';
      div.dataset.role = 'user'; div.dataset.text = text; div.dataset.time = time;
      div.innerHTML = `<div class="max-w-[85%] md:max-w-[75%]">
        <div class="bg-sage-50 border border-sage-200/70 rounded-2xl rounded-br-md px-4 py-3">
          <p class="text-sm text-stone-700 leading-relaxed whitespace-pre-wrap">${escapeHtml(text)}</p>
        </div>
        <p class="text-[10px] text-stone-400 mt-1 text-right mr-1">You · ${time}</p>
      </div>`;
      messagesEl.appendChild(div);
      if (animate) scrollToBottom();
    }

    function _addAIBubble(text, time, animate) {
      const div = document.createElement('div');
      div.className = (animate ? 'msg-animate ' : '') + 'flex justify-start';
      div.dataset.role = 'ai'; div.dataset.text = text; div.dataset.time = time;
      div.innerHTML = `<div class="max-w-[90%] md:max-w-[80%]">
        <div class="bg-white border border-stone-200/70 rounded-2xl rounded-bl-md px-5 py-4 shadow-sm shadow-stone-100/80">
          <div class="ai-prose text-sm text-stone-700 leading-relaxed">${renderMarkdown(text)}</div>
        </div>
        <p class="text-[10px] text-stone-400 mt-1 ml-1">AI Assistant · ${time}</p>
      </div>`;
      messagesEl.appendChild(div);
      if (animate) scrollToBottom();
    }

    function _addErrorBubble(text, animate) {
      const div = document.createElement('div');
      div.className = (animate ? 'msg-animate ' : '') + 'flex justify-start';
      div.dataset.role = 'error'; div.dataset.text = text;
      div.innerHTML = `<div class="max-w-[85%] md:max-w-[75%]">
        <div class="bg-white border border-red-200/60 rounded-2xl rounded-bl-md px-5 py-4">
          <div class="flex items-start gap-2.5">
            <svg class="w-4 h-4 text-red-400 mt-0.5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            <p class="text-sm text-red-600/80 leading-relaxed">${escapeHtml(text)}</p>
          </div>
        </div>
      </div>`;
      messagesEl.appendChild(div);
      if (animate) scrollToBottom();
    }

    function addTypingIndicator() {
      const div = document.createElement('div');
      div.id = 'typing-indicator'; div.className = 'msg-animate flex justify-start';
      div.innerHTML = `<div class="flex items-center gap-2 bg-white border border-stone-200/70 rounded-2xl rounded-bl-md px-4 py-3">
        <div class="flex items-center gap-1">
          <span class="dot-1 w-1.5 h-1.5 rounded-full bg-stone-400 inline-block"></span>
          <span class="dot-2 w-1.5 h-1.5 rounded-full bg-stone-400 inline-block"></span>
          <span class="dot-3 w-1.5 h-1.5 rounded-full bg-stone-400 inline-block"></span>
        </div>
        <span class="text-xs text-stone-400 ml-1">Searching documents…</span>
      </div>`;
      messagesEl.appendChild(div); scrollToBottom();
    }
    function removeTypingIndicator() { document.getElementById('typing-indicator')?.remove(); }

    function setProcessing(state) { isProcessing = state; sendBtn.disabled = state; inputEl.disabled = state; }
    function scrollToBottom() { requestAnimationFrame(() => chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' })); }
    function useQuestion(text) { inputEl.value = text; inputEl.dispatchEvent(new Event('input')); sendMessage(); }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isProcessing) return;
      if (text.length > 1000) { _addErrorBubble('Message too long.', true); return; }

      setProcessing(true);
      dismissWelcomeCard();
      _addUserBubble(text, formatTime(), true);
      inputEl.value = ''; inputEl.style.height = 'auto';
      charCounter.classList.add('hidden');
      addTypingIndicator();
      saveCurrentSession(); renderHistoryList();

      slowTimer = setTimeout(() => slowBanner.classList.add('visible'), 3000);
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 90000);

      try {
        const response = await fetch(`${API_BASE}/v1/ask`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: text }),
          signal: controller.signal,
        });
        clearTimeout(timeout); clearTimeout(slowTimer);
        slowBanner.classList.remove('visible'); removeTypingIndicator();

        if (response.status === 429) { _addErrorBubble('Rate limit reached. Please wait a moment.', true); }
        else if (response.status === 401) { _addErrorBubble('Authentication error.', true); }
        else if (!response.ok) { throw new Error(`Server error ${response.status}`); }
        else { const data = await response.json(); _addAIBubble(data.answer || 'No response received.', formatTime(), true); }
      } catch (err) {
        clearTimeout(timeout); clearTimeout(slowTimer);
        slowBanner.classList.remove('visible'); removeTypingIndicator();
        _addErrorBubble(err.name === 'AbortError' ? 'Request timed out. Please try again.' : 'Something went wrong.', true);
      } finally {
        setProcessing(false); saveCurrentSession(); renderHistoryList(); inputEl.focus();
      }
    }

    async function checkHealth() {
      try { const res = await fetch(`${API_BASE}/health`, { signal: AbortSignal.timeout(65000) }); setStatus(res.ok ? 'connected' : 'degraded'); }
      catch { setStatus('offline'); }
    }

    function setStatus(state) {
      const map = {
        connected: { dot: 'bg-sage-500', ping: 'bg-sage-400', bg: 'bg-sage-50 border-sage-200/60', text: 'text-sage-700', label: 'System Connected' },
        degraded: { dot: 'bg-amber-500', ping: 'bg-amber-400', bg: 'bg-amber-50 border-amber-200/60', text: 'text-amber-700', label: 'Degraded' },
        offline: { dot: 'bg-red-400', ping: 'bg-red-300', bg: 'bg-red-50 border-red-200/60', text: 'text-red-600', label: 'Offline' },
        checking: { dot: 'bg-stone-400', ping: 'bg-stone-400', bg: 'bg-stone-100 border-stone-200', text: 'text-stone-500', label: 'Checking…' },
      };
      const s = map[state] || map.checking;
      statusIndicator.className = `flex items-center gap-1.5 px-2.5 py-1 rounded-full border transition-all duration-500 ${s.bg}`;
      statusDot.className = `relative inline-flex rounded-full h-2 w-2 ${s.dot}`;
      statusPing.className = `animate-ping absolute inline-flex h-full w-full rounded-full opacity-50 ${s.ping}`;
      statusText.className = `text-[10px] font-medium ${s.text}`;
      statusText.textContent = s.label;
    }

    (function initVoice() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { micBtn.style.opacity = '0.4'; micBtn.style.cursor = 'not-allowed'; micBtn.onclick = () => alert('Voice input requires Chrome or Edge.'); return; }
      recognition = new SR();
      recognition.lang = 'en-IN'; recognition.interimResults = true; recognition.continuous = false; recognition.maxAlternatives = 1;
      let finalTranscript = '';
      recognition.onstart = () => { isListening = true; finalTranscript = ''; micBtn.classList.add('listening'); micBtn.title = 'Listening… click to stop'; };
      recognition.onresult = (e) => {
        let interim = ''; finalTranscript = '';
        for (let i = e.resultIndex; i < e.results.length; i++) { if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript; else interim += e.results[i][0].transcript; }
        inputEl.value = finalTranscript || interim; inputEl.dispatchEvent(new Event('input'));
      };
      recognition.onend = () => { isListening = false; micBtn.classList.remove('listening'); micBtn.title = 'Voice input'; if (finalTranscript.trim()) { inputEl.value = finalTranscript.trim(); inputEl.dispatchEvent(new Event('input')); inputEl.focus(); } };
      recognition.onerror = (e) => { isListening = false; micBtn.classList.remove('listening'); };
    })();

    function toggleVoice() { if (!recognition) return; if (isListening) recognition.stop(); else { try { recognition.start(); } catch (e) { } } }

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto'; inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
      const len = inputEl.value.length;
      if (len > 800) { charCounter.textContent = `${len}/1000`; charCounter.classList.remove('hidden'); charCounter.classList.toggle('text-red-400', len >= 950); charCounter.classList.toggle('text-stone-300', len < 950); }
      else { charCounter.classList.add('hidden'); }
    });

    inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey && !isProcessing) { e.preventDefault(); sendMessage(); } });

    newSession();
    checkHealth();
  </script>
</body>
